services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dules-web
    command: gunicorn app.main:app -w 1 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 --timeout 120
    env_file:
      - .env.prod
    ports:
      - "80:8000"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 350M
        reservations:
          memory: 200M

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dules-worker
    command: celery -A app.core.celery_app worker --pool=solo --loglevel=info
    env_file:
      - .env.prod
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 350M
        reservations:
          memory: 200M

  redis-broker:
    image: redis:7-alpine
    container_name: dules-redis-broker
    restart: unless-stopped
    command: redis-server --save "" --appendonly no
    deploy:
      resources:
        limits:
          memory: 100M
        reservations:
          memory: 50M

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: dules-tunnel-1
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    env_file:
      - .env.prod
    networks:
      - default